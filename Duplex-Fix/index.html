<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duplex Print Offset Correction Tool</title>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.25rem; }

    .subtitle { font-size: 0.875rem; color: #666; margin-bottom: 2rem; }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 0.75rem;
    }

    .drop-zone {
      border: 2px dashed #c8cfe0;
      border-radius: 8px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1.75rem;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #4f6ef7;
      background: #f5f7ff;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon { font-size: 2rem; margin-bottom: 0.5rem; }

    .drop-text { font-size: 0.9rem; color: #555; }
    .drop-text span { color: #4f6ef7; font-weight: 600; }

    .file-name {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #4f6ef7;
      font-weight: 500;
      min-height: 1.1rem;
    }

    .offset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.75rem;
    }

    .offset-field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 0.25rem;
    }

    .offset-field .hint { font-size: 0.72rem; color: #999; margin-bottom: 0.5rem; }

    .input-row { display: flex; align-items: center; gap: 0.4rem; }

    .input-row input[type="number"] {
      flex: 1;
      padding: 0.55rem 0.7rem;
      border: 1.5px solid #dde0e8;
      border-radius: 6px;
      font-size: 1rem;
      color: #1a1a2e;
      transition: border-color 0.2s;
      width: 100%;
    }

    .input-row input[type="number"]:focus { outline: none; border-color: #4f6ef7; }
    .input-row .unit { font-size: 0.8rem; color: #888; white-space: nowrap; }
    .direction-hint { font-size: 0.72rem; color: #aaa; margin-top: 0.3rem; }

    .btn {
      width: 100%;
      padding: 0.85rem;
      background: #4f6ef7;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover { background: #3a57e8; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #a0aec0; cursor: not-allowed; }

    .status {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      display: none;
    }

    .status.error   { background: #fff0f0; border: 1px solid #f5c6c6; color: #c0392b; }
    .status.working { background: #f0f4ff; border: 1px solid #c6d0f5; color: #3a57e8; }
    .status.success { background: #f0fff4; border: 1px solid #c6f5d0; color: #27ae60; }
  </style>
</head>
<body>
<div class="card">
  <h1>Duplex Offset Correction</h1>
  <p class="subtitle">Shifts even pages to fix duplex print misalignment. Runs entirely in your browser — your file is never uploaded anywhere.</p>

  <p class="section-label">PDF File</p>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="application/pdf">
    <div class="drop-icon">📄</div>
    <div class="drop-text">Drop your PDF here or <span>browse</span></div>
    <div class="file-name" id="fileName"></div>
  </div>

  <p class="section-label">Offset Settings</p>
  <div class="offset-grid">
    <div class="offset-field">
      <label for="yVal">Vertical (Y)</label>
      <div class="hint">Even pages only</div>
      <div class="input-row">
        <input type="number" id="yVal" value="0" step="0.1">
        <span class="unit">mm</span>
      </div>
      <div class="direction-hint">+ down &nbsp;/&nbsp; − up</div>
    </div>
    <div class="offset-field">
      <label for="xVal">Horizontal (X)</label>
      <div class="hint">Even pages only</div>
      <div class="input-row">
        <input type="number" id="xVal" value="0" step="0.1">
        <span class="unit">mm</span>
      </div>
      <div class="direction-hint">+ right &nbsp;/&nbsp; − left</div>
    </div>
  </div>

  <button class="btn" id="runBtn">Correct &amp; Download</button>
  <div class="status" id="status"></div>
</div>

<script>
  const MM_TO_PT = 72 / 25.4;

  const fileInput = document.getElementById("fileInput");
  const fileName  = document.getElementById("fileName");
  const dropZone  = document.getElementById("dropZone");
  const runBtn    = document.getElementById("runBtn");
  const status    = document.getElementById("status");

  let selectedFile = null;

  // ── File selection ──────────────────────────────────────────────────────────
  fileInput.addEventListener("change", () => {
    selectedFile = fileInput.files[0] || null;
    fileName.textContent = selectedFile ? selectedFile.name : "";
  });

  ["dragover", "dragenter"].forEach(ev =>
    dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add("dragover"); })
  );
  ["dragleave", "drop"].forEach(ev =>
    dropZone.addEventListener(ev, () => dropZone.classList.remove("dragover"))
  );
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    const f = e.dataTransfer.files[0];
    if (f && f.type === "application/pdf") {
      selectedFile = f;
      fileName.textContent = f.name;
    }
  });

  // ── Show status helper ──────────────────────────────────────────────────────
  function showStatus(type, msg) {
    status.className = "status " + type;
    status.textContent = msg;
    status.style.display = "block";
  }

  // ── Main ────────────────────────────────────────────────────────────────────
  runBtn.addEventListener("click", async () => {
    if (!selectedFile) { showStatus("error", "Please select a PDF file first."); return; }

    const xMm = parseFloat(document.getElementById("xVal").value) || 0;
    const yMm = parseFloat(document.getElementById("yVal").value) || 0;

    // Convert mm → points; positive Y input means "down" = negative in PDF coords
    const xPt =  xMm * MM_TO_PT;
    const yPt = -yMm * MM_TO_PT;

    runBtn.disabled = true;
    showStatus("working", "Processing… please wait.");

    try {
      const arrayBuffer = await selectedFile.arrayBuffer();
      const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
      const pages  = pdfDoc.getPages();

      // Even pages = index 1, 3, 5…
      for (let i = 1; i < pages.length; i += 2) {
        pages[i].translateContent(xPt, yPt);
      }

      const correctedBytes = await pdfDoc.save();
      const blob = new Blob([correctedBytes], { type: "application/pdf" });

      // Trigger download
      const baseName = selectedFile.name.replace(/\.pdf$/i, "");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = baseName + "_corrected.pdf";
      a.click();
      URL.revokeObjectURL(a.href);

      showStatus("success", "Done! Your corrected PDF has been downloaded.");
    } catch (err) {
      showStatus("error", "Error processing PDF: " + err.message);
    } finally {
      runBtn.disabled = false;
    }
  });
</script>
</body>
</html>
